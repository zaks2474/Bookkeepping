# Lab Loop Safety Configuration
# ==============================
# Blast-radius controls and security guardrails
# Location: ~/.labloop/safety.conf or /path/to/labloop/config/safety.conf

# ============================================================
# PROTECTED PATHS
# ============================================================
# Files/patterns Builder must NEVER modify (glob patterns, one per line)
# These are absolute red lines - modifications cause immediate cycle failure

PROTECTED_PATHS=(
    ".env"
    ".env.local"
    ".env.production"
    ".env.development"
    "**/.env"
    "**/.env.local"
    "**/.env.production"
    "**/secrets/**"
    "**/credentials/**"
    "**/*.pem"
    "**/*.key"
    "**/*.p12"
    "**/*.pfx"
    "**/config/production.*"
    "**/id_rsa*"
    "**/.ssh/**"
)
# NOTE: .env.example and .env.template are ALLOWED (template files, not secrets)

# ============================================================
# DECISION-LOCKED PATHS
# ============================================================
# Architecturally locked paths - from authoritative docs
# Modifications require explicit human approval before continuing

DECISION_LOCKED_PATHS=(
    # Add paths from /home/zaks/bookkeeping/docs/** that are decision-locked
    # Example: "src/core/architecture.ts"
)

# ============================================================
# COMMAND DENYLIST
# ============================================================
# Regex patterns for commands Builder must NEVER execute
# Match triggers immediate cycle failure

COMMAND_DENYLIST=(
    "^rm\\s+-rf\\s+/"
    "^rm\\s+-rf\\s+~"
    "^rm\\s+-rf\\s+\\\$HOME"
    "^sudo\\s+rm"
    "^chmod\\s+777"
    "^curl.*\\|.*sh"
    "^wget.*\\|.*sh"
    "^eval\\s+"
    "^dd\\s+if="
    "^mkfs\\."
    "^shutdown"
    "^reboot"
    "^init\\s+[0-6]"
    ":(){\\s*:|:&\\s*};:"
    "^npm\\s+publish"
    "^pip\\s+upload"
    "^docker\\s+push"
    "^git\\s+push.*--force"
    "^git\\s+push.*-f\\b"
)

# ============================================================
# DIFF LIMITS
# ============================================================
# Blast-radius controls for code changes

# Maximum files Builder can modify per cycle
MAX_FILES_PER_CYCLE=20

# Maximum total lines changed per cycle (insertions + deletions)
MAX_LINES_PER_CYCLE=1000

# Maximum lines changed in a single file
MAX_LINES_PER_FILE=300

# Action when limits exceeded: "escalate" (stop) or "warn" (continue with warning)
DIFF_LIMIT_ACTION="escalate"

# ============================================================
# REPO CLEANLINESS
# ============================================================

# Require clean git status at loop start (true/false)
REQUIRE_CLEAN_START=false

# Automatically stash uncommitted changes at start (true/false)
AUTO_STASH=false

# Maximum uncommitted files before warning (0 = no limit)
MAX_UNCOMMITTED_FILES=50

# ============================================================
# SECRETS REDACTION
# ============================================================
# Redact sensitive data from logs and escalation packets

# Enable redaction (true/false)
REDACT_SECRETS=true

# Patterns to redact (applied to logs before archiving)
# These are applied with grep -E
REDACT_PATTERNS=(
    "(api[_-]?key|apikey).*[a-zA-Z0-9_-]{20,}"
    "(secret|password|passwd|pwd).*[^[:space:]]{8,}"
    "(token|bearer).*[a-zA-Z0-9_.-]{20,}"
    "authorization.*bearer"
    "(aws_secret|aws_access).*[A-Za-z0-9/+=]{20,}"
    "-----BEGIN.*KEY-----"
    "ghp_[a-zA-Z0-9]{36}"
    "sk-[a-zA-Z0-9]{48}"
    "xox[baprs]-[a-zA-Z0-9-]+"
)

# Replacement string for redacted content
REDACT_REPLACEMENT="[REDACTED]"
